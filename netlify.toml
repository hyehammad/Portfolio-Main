[build]
  command = "npm run build"
  publish = "dist/public"

[build.processing.node_bundle]
  # Removed tailwindcss from the list below to allow the build to succeed
  ignored_node_modules = ["vite", "@replit/vite-plugin-cartographer"]

[functions]
  directory = "server"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
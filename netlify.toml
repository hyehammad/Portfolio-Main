[build]
  command = "npm run build"
  publish = "dist/public"

[functions]
  directory = "server"
  # This tells Netlify to ignore the build-only files that are causing errors
  ignored_node_modules = ["vite", "@replit/vite-plugin-cartographer", "tailwindcss"]
  # This helps with the database driver errors
  external_node_modules = ["@tailwindcss/oxide", "lightningcss"]

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200